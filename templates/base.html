<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">

    <title>{% block title %}{% endblock %}</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="sidebar">

    <img
        src="{{ url_for('static', filename='img/logo_equatorial.png') }}"
        class="logo-menu">

    <a href="/" title="Home"
       class="{% if request.path == '/' %}menu-ativo{% endif %}">
        <i class="bi bi-house-door"></i>
    </a>

    <a href="/levantamentos" title="Levantamentos"
       class="{% if request.path.startswith('/levantamentos') or request.path.startswith('/novo') or request.path.startswith('/visualizar') or request.path.startswith('/editar_levantamento') %}menu-ativo{% endif %}">
        <i class="bi bi-clipboard-data"></i>
    </a>

    <a href="/expurgos"
        title="Expurgos"
        class="{% if request.path.startswith('/expurgos') or request.path.startswith('/visualizar_expurgo') %}menu-ativo{% endif %}">
        <i class="bi bi-file-earmark-x"></i>
    </a>

    <a href="/projetos" title="Projetos"
       class="{% if request.path.startswith('/projetos') or request.path.startswith('/fazer_projeto') or request.path.startswith('/visualizar_projeto') or request.path.startswith('/editar_projeto') %}menu-ativo{% endif %}">
        <i class="bi bi-folder2-open"></i>
    </a>

    <a href="/licenciamentos"
        title="Licenciamentos"
        class="{% if request.path.startswith('/licenciamentos') or request.path.startswith('/fazer_licenciamento') %}menu-ativo{% endif %}">
        <i class="bi bi-tree-fill"></i>
    </a>

    {% if session.get("usuario_perfil") == "TATICO" %}

        <a href="/criar_usuario" title="Usuários"
           class="{% if request.path.startswith('/criar_usuario') %}menu-ativo{% endif %}">
            <i class="bi bi-people"></i>
        </a>

    {% endif %}

    <div class="sidebar-footer">

        <a href="/perfil"
            title="Meu Perfil">
                <i class="bi bi-person-circle"></i>
        </a>

        <a href="/logout" title="Sair">
            <i class="bi bi-box-arrow-left"></i>
        </a>

    </div>

</div>

<div class="content">

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
