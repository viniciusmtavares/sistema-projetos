<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <title>Login - Sistema de Projetos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body {
            background: #F4F7FB;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
        }

        .login-card {
            width: 420px;
            border: none;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(13, 45, 140, 0.18);
            overflow: hidden;
        }

        .login-header {
            background: linear-gradient(
                180deg,
                #0D2D8C 0%,
                #1239A6 100%
            );
            color: white;
            padding: 28px;
            text-align: center;
        }

        .login-header h3 {
            margin: 0;
            font-weight: 700;
        }

        .login-header p {
            margin: 5px 0 0 0;
            opacity: 0.9;
            font-size: 14px;
        }

        .login-body {
            padding: 30px;
            background: white;
        }

        .btn-login {
            background: #0D2D8C;
            color: white;
            border: none;
            font-weight: 600;
        }

        .btn-login:hover {
            background: #1A45B8;
            color: white;
        }

    </style>

</head>

<body>

    <div class="card login-card">

        <div class="login-header">

            <h3>projetinhos</h3>

            <p>Gestão de Levantamentos e Projetos</p>

        </div>

        <div class="login-body">

            {% if erro %}

                <div class="alert alert-danger">
                    {{ erro }}
                </div>

            {% endif %}

            <form method="POST">

                <div class="mb-3">

                    <label class="form-label">
                        Usuário
                    </label>

                    <input
                        type="text"
                        class="form-control"
                        name="usuario"
                        required>

                </div>

                <div class="mb-4">

                    <label class="form-label">
                        Senha
                    </label>

                    <input
                        type="password"
                        class="form-control"
                        name="senha"
                        required>

                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary">
                        Entrar
                    </button>

                </button>

            </form>

        </div>

    </div>

</body>

</html>
